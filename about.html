<h2>About</h2>

<p>
본 사이트는 주식 및 ETF 시장 데이터를 기반으로
투자 판단을 돕기 위한 모니터링 시스템을 제공합니다.
</p>

<p>
RSI, 이동평균선, 거래량 등의 기술적 지표를 활용하여
시장 흐름을 직관적으로 파악할 수 있도록 설계되었습니다.
</p>

<p>
사용자는 다양한 필터 기능을 통해 조건에 맞는 종목을 탐색할 수 있으며,
이를 통해 보다 효율적인 투자 전략 수립이 가능합니다.
</p>

<p>
본 사이트의 정보는 투자 참고용으로 제공되며,
최종 투자 판단은 개인의 책임 하에 이루어져야 합니다.
</p>
