name: Stock Data Update

on:
  schedule:
    - cron: '0 0 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas==2.2.2 openpyxl
          pip install pandas-ta==0.3.14b0 --no-dependencies

      - name: Run analysis
        run: python tck_analysis_github.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_analysis.json || echo "No files to add"
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data: $(date +'%Y-%m-%d')" && git push)
