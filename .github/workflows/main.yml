name: Stock Data Update

on:
  schedule:
    - cron: '0 23 * * 5' # 매주 토요일 오전 8시 (KST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # 로컬과 동일한 3.13 버전 사용

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 로컬에서 잘 돌아갔던 구성 그대로 설치합니다.
          pip install yfinance pandas pandas-ta

      - name: Run analysis
        run: python tck_analysis_github.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_analysis.json || echo "No files to add"
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Update stock data: $(date +'%Y-%m-%d')" &&
            git pull --rebase origin main &&
            git push origin main
          )
