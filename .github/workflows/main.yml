name: Stock Data Update

on:
  schedule:
    - cron: '0 0 * * 6' # 매주 토요일 오전 9시 (KST)
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write # 파일 수정 권한 부여

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 버전을 3.11로 강제 상향

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 에러의 원인인 pandas-ta를 위해 개별 라이브러리를 직접 설치합니다.
          pip install yfinance pandas==2.2.2 openpyxl
          # 정식 배포판 대신 개발자용 최신 소스(GitHub)에서 직접 설치하여 충돌을 방지합니다.
          pip install git+https://github.com/twopirllc/pandas-ta.git

      - name: Run analysis
        # 실행 파일 이름(tck_analysis_github.py)을 확인하세요.
        run: python tck_analysis_github.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 생성된 모든 결과물(json)을 강제로 추가
          git add stock_analysis.json || echo "No files to add"
          # 변경사항이 있을 때만 커밋 및 푸시
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data: $(date +'%Y-%m-%d')" && git push)
