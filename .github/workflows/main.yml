name: Stock Data Update

on:
  schedule:
    # 한국 시간(KST) 매주 토요일 오전 9시
    - cron: '0 0 * * 6'
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 버전을 3.11로 상향 조정

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 버전 충돌을 피하기 위해 pandas 버전을 고정하고 필요한 라이브러리만 설치합니다.
          pip install yfinance pandas==2.2.2 openpyxl
          # pandas-ta는 PyPI 버전 대신 GitHub 최신 소스로 직접 설치하여 오류를 방지합니다.
          pip install git+https://github.com/twopirllc/pandas-ta.git

      - name: Run analysis
        # 실행 파일명을 실제 파일명과 일치시켰습니다.
        run: python tck_analysis_github.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 생성된 모든 결과물 추가
          git add stock_analysis.json || echo "No files to add"
          # 변경사항이 있을 때만 커밋 및 푸시
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data: $(date +'%Y-%m-%d')" && git push)
