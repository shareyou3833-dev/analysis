name: Stock Data Update

on:
  schedule:
    - cron: '0 0 * * 6' # 토요일 09:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 버전을 3.11로 상향 조정

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 라이브러리들을 개별적으로 설치하여 충돌을 방지합니다.
          pip install yfinance pandas==2.2.2 openpyxl 
          # pandas-ta는 PyPI 정식 버전 대신 개발자용 최신 버전을 직접 설치하는 것이 가장 확실합니다.
          pip install git+https://github.com/twopirllc/pandas-ta.git

      - name: Run analysis
        run: python tck_analysis_github.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 생성된 모든 결과물을 추가합니다.
          git add stock_analysis.json stock_analysis.xlsx || echo "No files to add"
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data: $(date +'%Y-%m-%d')" && git push)
