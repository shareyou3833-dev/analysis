name: Stock Data Update

on:
  schedule:
    - cron: '0 0 * * 6' # 매주 토요일 오전 9시 (KST)
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 이미 성공한 패키지들은 그대로 유지합니다.
          pip install yfinance pandas==2.2.2 openpyxl
          # pandas-ta 설치 시 발생하는 의존성 충돌을 무시하고 강제 설치합니다.
          pip install pandas-ta==0.3.14b0 --no-dependencies

      - name: Run analysis
        # 실행 파일명이 tck_analysis_github.py 인지 꼭 확인하세요!
        run: python tck_analysis_github.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 생성된 모든 데이터 파일을 추가합니다.
          git add stock_analysis.json stock_analysis.xlsx || echo "No files to add"
          # 변경사항이 있을 때만 커밋 및 업로드
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data: $(date +'%Y-%m-%d')" && git push)
