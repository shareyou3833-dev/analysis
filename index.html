<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주식 분석 대시보드</title>

<style>
  body {
    background: #020617;
    color: #e5e7eb;
    font-family: sans-serif;
    padding: 20px;
  }

  h2 {
    margin-bottom: 20px;
  }

  .top-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  #tickerSearch {
    padding: 8px 12px;
    background: #1e293b;
    border: 1px solid #334155;
    color: #fff;
    border-radius: 4px;
    width: 250px;
  }

  .button-guide {
    font-size: 13px;
    background: #0f172a;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #1e293b;
    color: #94a3b8;
  }
  
  .button-guide span { margin-left: 15px; }
  .button-guide b { color: #e5e7eb; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  th, td {
    padding: 8px;
    text-align: center;
    border-bottom: 1px solid #1e293b;
  }

  th {
    background: #0f172a;
    position: relative;
  }

  tr:hover { background: #1e293b; }

  /* 그룹 구분을 위한 세로선 스타일 */
  .border-left {
    border-left: 2px solid #475569 !important;
  }

  .btn-icon {
    cursor: pointer;
    font-size: 10px;
    margin-left: 4px;
    opacity: 0.7;
  }

  .filter-popup {
    display: none;
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    border: 1px solid #475569;
    padding: 10px;
    border-radius: 6px;
    z-index: 100;
    box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    white-space: nowrap;
    text-align: left;
  }
  
  .filter-popup input, .filter-popup select {
    width: 70px; padding: 4px; margin: 2px 0;
    background: #0f172a; border: 1px solid #334155;
    color: white; border-radius: 4px;
  }

  .filter-popup button {
    padding: 4px 8px; margin-top: 6px;
    border: none; border-radius: 4px;
    cursor: pointer; background: #3b82f6; color: white;
  }
  .filter-popup button.clear-btn { background: #ef4444; }

  .filter-active { color: #facc15; opacity: 1; }

  /* 색상 클래스 */
  .red { color: #ef4444; font-weight: bold; }
  .blue { color: #38bdf8; font-weight: bold; }
  .yellow { color: #facc15; font-weight: bold; } /* 이격도 절댓값 강조용 */
  .white { color: #ffffff; }
</style>
</head>

<body>

<h2>📊 주식 분석 대시보드</h2>

<div class="top-container">
  <div class="control-panel">
    <input type="text" id="tickerSearch" placeholder="Ticker 검색 (예: AAPL)" oninput="renderTable()">
  </div>
  
  <div class="button-guide">
    <span><b>Golden(상승추세)</b></span>
    <span><b>Dead(하락추세)</b></span>
    <span><b>RSI 70 이상(과매수-탐욕)</b></span>
    <span><b>RSI 30 이하(과매도-공포)</b></span>
    <span>↕️ <b>정렬</b></span>
    <span>🔍 <b>조건 설정</b></span>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th rowspan="2">Ticker <span class="btn-icon" onclick="handleSort('Ticker')">↕️</span></th>
      <th colspan="5" class="border-left">수익률 (%)</th>
      <th colspan="3" class="border-left">크로스</th>
      <th colspan="4" class="border-left">이동평균선과의 이격도 (%)</th>
      <th colspan="3" class="border-left">RSI(매매강도)</th>
    </tr>
    <tr id="sub-headers"></tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
let allData = [];
let filterState = {};
let sortState = { key: null, asc: true };

const columns = [
  { label: '1D', key: 'Return_1D', type: 'number', divider: true },
  { label: '1W', key: 'Return_1W', type: 'number' },
  { label: '1M', key: 'Return_1M', type: 'number' },
  { label: '6M', key: 'Return_6M', type: 'number' },
  { label: '1Y', key: 'Return_1Y', type: 'number' },
  { label: 'Day', key: 'Cross_D', type: 'string', divider: true },
  { label: 'Week', key: 'Cross_W', type: 'string' },
  { label: 'Month', key: 'Cross_M', type: 'string' },
  { label: '50 Day', key: 'Dist50_D', type: 'number', divider: true },
  { label: '200 Day', key: 'Dist200_D', type: 'number' },
  { label: '50 Week', key: 'Dist50_W', type: 'number' },
  { label: '200 Week', key: 'Dist200_W', type: 'number' },
  { label: 'Day', key: 'RSI_D', type: 'number', divider: true },
  { label: 'Week', key: 'RSI_W', type: 'number' },
  { label: 'Month', key: 'RSI_M', type: 'number' }
];

async function loadData() {
  try {
    const res = await fetch('stock_analysis.json');
    allData = await res.json();
    buildHeaders();
    renderTable();
  } catch(e) {
    console.error("데이터 로드 실패: ", e);
  }
}

function buildHeaders() {
  const tr = document.getElementById('sub-headers');
  let html = '';

  columns.forEach(col => {
    let popupContent = col.type === 'number' ? `
        <input type="number" id="min-${col.key}" placeholder="최소"> ~
        <input type="number" id="max-${col.key}" placeholder="최대"><br>
        <button onclick="applyFilter('${col.key}', 'number')">적용</button>
        <button class="clear-btn" onclick="clearFilter('${col.key}')">초기화</button>
    ` : `
        <select id="val-${col.key}">
          <option value="">선택</option>
          <option value="Golden">Golden</option>
          <option value="Dead">Dead</option>
        </select><br>
        <button onclick="applyFilter('${col.key}', 'string')">적용</button>
        <button class="clear-btn" onclick="clearFilter('${col.key}')">초기화</button>
    `;

    html += `
      <th class="${col.divider ? 'border-left' : ''}">
        ${col.label}
        <span class="btn-icon" onclick="handleSort('${col.key}')">↕️</span>
        <span class="btn-icon" id="icon-${col.key}" onclick="togglePopup('${col.key}', event)">🔍</span>
        <div class="filter-popup" id="popup-${col.key}" onclick="event.stopPropagation()">${popupContent}</div>
      </th>
    `;
  });
  tr.innerHTML = html;
}

function togglePopup(key, event) {
  event.stopPropagation();
  const currentPopup = document.getElementById(`popup-${key}`);
  const isVisible = currentPopup.style.display === 'block';
  document.querySelectorAll('.filter-popup').forEach(p => p.style.display = 'none');
  if (!isVisible) currentPopup.style.display = 'block';
}

document.addEventListener('click', () => {
  document.querySelectorAll('.filter-popup').forEach(p => p.style.display = 'none');
});

function applyFilter(key, type) {
  if (type === 'number') {
    const min = document.getElementById(`min-${key}`).value;
    const max = document.getElementById(`max-${key}`).value;
    if (min !== '' || max !== '') {
      filterState[key] = { type: 'number', min: min===''?-Infinity:Number(min), max: max===''?Infinity:Number(max) };
    } else delete filterState[key];
  } else {
    const val = document.getElementById(`val-${key}`).value;
    if (val !== '') filterState[key] = { type: 'string', val: val };
    else delete filterState[key];
  }
  document.getElementById(`icon-${key}`).classList.toggle('filter-active', !!filterState[key]);
  document.getElementById(`popup-${key}`).style.display = 'none';
  renderTable();
}

function clearFilter(key) {
  delete filterState[key];
  ['min-','max-','val-'].forEach(p => { if(document.getElementById(p+key)) document.getElementById(p+key).value = ''; });
  document.getElementById(`icon-${key}`).classList.remove('filter-active');
  document.getElementById(`popup-${key}`).style.display = 'none';
  renderTable();
}

function handleSort(key) {
  sortState.asc = (sortState.key === key) ? !sortState.asc : true;
  sortState.key = key;
  renderTable();
}

function renderTable() {
  let result = [...allData];
  const search = document.getElementById('tickerSearch').value.toUpperCase();
  if (search) result = result.filter(item => item.Ticker.toUpperCase().includes(search));

  for (let key in filterState) {
    const f = filterState[key];
    result = result.filter(item => f.type === 'number' ? (item[key] >= f.min && item[key] <= f.max) : (item[key] === f.val));
  }

  if (sortState.key) {
    result.sort((a, b) => {
      let vA = a[sortState.key] ?? '', vB = b[sortState.key] ?? '';
      return sortState.asc ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
    });
  }

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = '';

  const rsiColor = v => v >= 70 ? "red" : (v <= 30 ? "blue" : "white");
  
  /**
   * 이격도 절댓값이 5 이하일 때 노란색 반환 함수
   * Math.abs(v) <= 5 : -5% 에서 +5% 사이의 값들을 모두 노란색으로 표시
   */
  const distColor = v => (v !== null && Math.abs(v) <= 5) ? "yellow" : "white";

  result.forEach(item => {
    const row = `
      <tr>
        <td>${item.Ticker}</td>
        <td class="border-left">${item.Return_1D ?? ""}</td>
        <td>${item.Return_1W ?? ""}</td>
        <td>${item.Return_1M ?? ""}</td>
        <td>${item.Return_6M ?? ""}</td>
        <td>${item.Return_1Y ?? ""}</td>
        <td class="border-left">${item.Cross_D ?? ""}</td>
        <td>${item.Cross_W ?? ""}</td>
        <td>${item.Cross_M ?? ""}</td>
        <td class="border-left ${distColor(item.Dist50_D)}">${item.Dist50_D ?? ""}</td>
        <td class="${distColor(item.Dist200_D)}">${item.Dist200_D ?? ""}</td>
        <td class="${distColor(item.Dist50_W)}">${item.Dist50_W ?? ""}</td>
        <td class="${distColor(item.Dist200_W)}">${item.Dist200_W ?? ""}</td>
        <td class="border-left ${rsiColor(item.RSI_D)}">${item.RSI_D ?? ""}</td>
        <td class="${rsiColor(item.RSI_W)}">${item.RSI_W ?? ""}</td>
        <td class="${rsiColor(item.RSI_M)}">${item.RSI_M ?? ""}</td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
}

loadData();
</script>

</body>
</html>
